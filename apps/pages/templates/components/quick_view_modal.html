<div class="modal" id="quickModal">
    <div class="modal-card product-modal">
        <button class="close-btn" data-close="quick">
            <i class="fa-solid fa-xmark"></i>
        </button>

        <div class="product-modal-grid">
            <div>
                <img id="modalMainImg" class="modal-main-img" src="" alt="">
                <div class="thumbs" id="modalThumbs"></div>
            </div>

            <div>
                <span id="modalCode" class="product-code"></span>

                <h2 id="modalTitle"></h2>

                <p id="modalDesc" class="muted"></p>

                <div class="modal-price">
                    <span id="modalOld"></span>
                    <strong id="modalPrice"></strong>
                    <em id="modalDiscount"></em>
                </div>

                <ul class="spec-list">
                    <li><strong>Metal:</strong> <span id="modalMetal"></span></li>
                    <li><strong>Weight:</strong> <span id="modalWeight"></span></li>
                    <li><strong>Stone:</strong> <span id="modalStone"></span></li>
                    <li><strong>Stock:</strong> <span id="modalStock"></span></li>
                </ul>

                <div class="share-row">
                    <span>Share:</span>
                    <i class="fa-brands fa-facebook"></i>
                    <i class="fa-brands fa-whatsapp"></i>
                    <i class="fa-brands fa-x-twitter"></i>
                </div>

                <div class="modal-actions">
                    <button class="gold-btn" id="modalAddCart">Add To Cart</button>
                    <button class="dark-btn">Buy Now</button>
                    <button class="outline-btn" id="modalWishlist">
                        <i class="fa-regular fa-heart"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
