<!-- CART SIDEBAR -->
  <aside class="side-panel" id="cartPanel">
    <button class="close-btn" data-close="cart"><i class="fa-solid fa-xmark"></i></button>
    <h2>Your Cart</h2>
    <div id="cartItems"></div>

    <div class="cart-summary">
      <div><span>Subtotal</span><strong id="subtotalAmount">৳0</strong></div>
      <div><span>Delivery</span><strong id="deliveryAmount">৳80</strong></div>
      <div class="total-line"><span>Total</span><strong id="totalAmount">৳0</strong></div>
      <button class="gold-btn full" id="checkoutOpen">Checkout</button>
    </div>
  </aside>
