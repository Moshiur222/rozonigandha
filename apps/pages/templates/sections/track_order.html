<section class="track-section reveal" id="track">
    <div class="track-box">
        <h2>Track Your Order</h2>

        <p>Enter your order ID and see the delivery progress.</p>

        <div class="track-form">
            <input type="text" id="trackInput" placeholder="Example: RA-1001">
            <button id="trackBtn">Track Now</button>
        </div>

        <div class="tracking-steps" id="trackingSteps">
            <div class="step active">
                <i class="fa-solid fa-check"></i>
                <span>Order Placed</span>
            </div>

            <div class="step">
                <i class="fa-solid fa-box"></i>
                <span>Processing</span>
            </div>

            <div class="step">
                <i class="fa-solid fa-truck"></i>
                <span>Shipped</span>
            </div>

            <div class="step">
                <i class="fa-solid fa-gem"></i>
                <span>Delivered</span>
            </div>
        </div>
    </div>
</section>
